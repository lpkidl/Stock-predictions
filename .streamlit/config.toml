# Pin the dark Apple-style theme regardless of the OS setting.
# Without this, Streamlit follows the system theme and the custom CSS in
# ui/app.py ends up fighting it (white-on-white / dark-on-dark).
[theme]
base = "dark"
primaryColor = "#0a84ff"
backgroundColor = "#0e0e10"
secondaryBackgroundColor = "#1c1c1e"
textColor = "#f5f5f7"
font = "sans serif"

[browser]
gatherUsageStats = false
